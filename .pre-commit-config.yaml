default_stages: [pre-commit]
fail_fast: false
minimum_pre_commit_version: "3.2.0"

default_language_version:
  python: python3.12

repos:
  # pre-commit-hooks - standard file & code safety checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-json
      - id: check-toml
      - id: check-xml
      - id: check-yaml
      - id: debug-statements
      - id: check-builtin-literals
      - id: check-case-conflict
      - id: check-docstring-first
      - id: detect-private-key
      
  # django-upgrade - updates Django syntax to 6.0+
  - repo: https://github.com/adamchainz/django-upgrade
    rev: '1.30.0'
    hooks:
      - id: django-upgrade
        args: ['--target-version', '6.0']

  # lock - ensure the lockfile is up-to-date
  - repo: https://github.com/astral-sh/uv-pre-commit
    # uv version.
    rev: 0.11.7
    hooks:
      # Update the uv lockfile
      - id: uv-lock

  # ruff - linting & formatting (replaces black, flake8, isort)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      # Linter
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]
      # Formatter
      - id: ruff-format

  # pyright - fast type checking 
  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.408
    hooks:
    - id: pyright

  # bandit - security audit
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.9
    hooks:
      - id: bandit
        args: [-c, pyproject.toml]
        additional_dependencies: ["bandit[toml]"]
        exclude: ^tests/

